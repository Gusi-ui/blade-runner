name: Deploy Cloudflare Worker

on:
  push:
    branches: [main]
    paths:
      - 'workers/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verificar secretos de Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Falta CLOUDFLARE_API_TOKEN en GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Falta CLOUDFLARE_ACCOUNT_ID en GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          if echo "$CLOUDFLARE_API_TOKEN" | grep -qE '[[:space:]]'; then
            echo "::error::CLOUDFLARE_API_TOKEN tiene espacios o saltos de línea. Vuelve a crear el secreto copiando solo el token, sin comillas ni 'Bearer'."
            exit 1
          fi
          if echo "$CLOUDFLARE_API_TOKEN" | grep -qE '^Bearer '; then
            echo "::error::CLOUDFLARE_API_TOKEN no debe incluir el prefijo 'Bearer '. Solo el token."
            exit 1
          fi
          if [ "${#CLOUDFLARE_API_TOKEN}" -lt 30 ]; then
            echo "::error::CLOUDFLARE_API_TOKEN parece demasiado corto. Usa un API Token de Cloudflare, no la Global API Key."
            exit 1
          fi
          if ! echo "$CLOUDFLARE_ACCOUNT_ID" | grep -qE '^[a-f0-9]{32}$'; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID debe ser 32 caracteres hex (sin guiones). Obténlo con: pnpm --filter blade-runner-api exec wrangler whoami"
            exit 1
          fi

      - name: Deploy Worker
        working-directory: workers
        run: pnpm run release
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
