version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      astro:
        patterns:
          - 'astro'
          - '@astrojs/*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
          - 'typescript-eslint'
      tailwind:
        patterns:
          - 'tailwindcss'
          - '@tailwindcss/*'
      dev-tools:
        patterns:
          - 'prettier*'
          - 'vitest'
          - 'husky'
          - 'lint-staged'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
